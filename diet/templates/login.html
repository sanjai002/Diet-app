<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
    crossorigin="anonymous"></script>
</head>

<body>
  <section class="vh-100 ">
    <div class="container">
      <div class=" row vh-100 d-flex justify-content-center align-content-center ">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
          <div class="card" style="border-radius: 15px;">
            <div class="card-body p-5 ">
              <h2 class="text-uppercase text-center mb-5">Login</h2>
              <form action="{% url 'login' %}" method='post'>
                {% csrf_token %}
                <div class="form-floating mb-3">
                  <input type="text" class="form-control" name="username" id="floatingInput" placeholder=" ">
                  <label for="floatingInput">Username</label>
                </div>
                <div class="form-floating mb-3">
                  <input type="password" class="form-control" name="password" id="floatingInput" placeholder=" ">
                  <label for="floatingInput">Password</label>
                </div>

                {% if message %}
                <div class="text-center text-danger pt-1 pb-2">{{ message }}</div>
                {% endif %}

                <div class="d-flex justify-content-center">
                  

                  <button type="submit" class="btn btn-primary btn-block btn-lg gradient-custom-4 text-body">Login</button>
                </div>

                <p class="text-center text-muted mt-3 mb-5">Not a Member <a href="{% url 'register' %}"
                    class="fw-bold text-body"><u>Register</u></a></p>

              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>

</html>
