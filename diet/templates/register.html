{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
    crossorigin="anonymous"></script>
  <scrip src="{% static 'js/details.js' %}">
    </script>
    <script src="https://code.jquery.com/jquery-3.6.4.slim.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
  <section class="vh-100 ">
    <div class="container">
      <div class=" row vh-100 d-flex justify-content-center align-content-center ">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
          <div class="card" style="border-radius: 15px;">
            <div class="card-body p-5 ">
              <h2 class="text-uppercase text-center">Create an account</h2>
              <form action="{% url 'register' %}" method='post'>
                {% csrf_token %}

                <div class="form-floating mb-2">
                  <input type="text" class="form-control" name="username" placeholder=" " required>
                  <label for="floatingInput">Username</label>
                </div>

                <div class="form-floating mb-2">
                  <input type="text" class="form-control" name="email" placeholder=" " required>
                  <label for="floatingInput">Email</label>
                </div>

                <div class="form-floating mb-2">
                  <input type="password" class="form-control" name="password1" placeholder=" " required>
                  <label for="floatingInput">Password</label>
                </div>
                <div class="form-floating mb-2">
                  <input type="password" class="form-control" name="password2" placeholder=" " required>
                  <label for="floatingInput">Repeat Password</label>
                </div>

                {% if message %}
                <div class="text-center text-danger pt-1 pb-2">{{ message }}</div>
                {% endif %}               

                <div class="d-flex justify-content-center">
                  <button type="submit"
                    class="btn btn-success btn-block btn-lg gradient-custom-4 text-body">Register</button>
                </div>

                <p class="text-center text-muted mt-3 mb-0">Have already an account? <a href="{% url 'login' %}"
                    class="fw-bold text-body"><u>Login here</u></a></p>

              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>

</html>
